name: Daily LeetCode Sync

on:
  schedule:
    - cron: '0 18 * * *'  # Runs daily at 18:00 UTC (11:30 PM IST)
  workflow_dispatch:      # Allows you to click "Run Now" manually

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests pygithub google-generativeai

      - name: Run Script
        env:
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          TARGET_REPO: ${{ secrets.TARGET_REPO }}
          QUIET_MODE: "true"
          # AI Provider Configuration
          AI_PROVIDER: "groq"  # Use Groq by default (14,400 req/day)
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}  # Fallback
          # AI Retry and rate limiting configuration
          AI_RETRY_ATTEMPTS: "3"
          AI_RETRY_DELAY: "10"
          SUBMISSION_DELAY: "3"
        run: python daily_sync.py
